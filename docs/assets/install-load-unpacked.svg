<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Load Lishu through chrome://extensions</title>
  <desc id="desc">A synthetic visual guide showing Developer mode, Load unpacked, and selecting the Lishu extension folder.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#182230" flood-opacity="0.16" />
    </filter>
  </defs>
  <rect width="1200" height="720" fill="#fbfcfe" />
  <rect x="56" y="54" width="1088" height="612" rx="22" fill="#ffffff" stroke="#d0d5dd" filter="url(#shadow)" />
  <rect x="56" y="54" width="1088" height="70" rx="22" fill="#f2f4f7" />
  <circle cx="92" cy="90" r="8" fill="#f04438" />
  <circle cx="120" cy="90" r="8" fill="#fdb022" />
  <circle cx="148" cy="90" r="8" fill="#12b76a" />
  <rect x="190" y="72" width="470" height="36" rx="18" fill="#ffffff" stroke="#d0d5dd" />
  <text x="214" y="96" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#344054">chrome://extensions</text>

  <g transform="translate(96 160)">
    <text x="0" y="0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="850" fill="#182230">Install Lishu locally</text>
    <text x="0" y="42" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#667085">Use a clean Chrome extensions page, then load the unzipped release folder or the built dist/ folder.</text>
  </g>

  <g transform="translate(96 250)">
    <rect x="0" y="0" width="470" height="300" rx="16" fill="#ffffff" stroke="#d0d5dd" />
    <text x="28" y="48" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="800" fill="#182230">Extensions</text>
    <g transform="translate(300 18)">
      <text x="0" y="16" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#344054">Developer mode</text>
      <rect x="18" y="28" width="92" height="40" rx="20" fill="#0969da" />
      <circle cx="88" cy="48" r="15" fill="#ffffff" />
      <text x="124" y="54" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="800" fill="#0969da">ON</text>
    </g>
    <g transform="translate(28 94)">
      <rect x="0" y="0" width="170" height="48" rx="8" fill="#0969da" />
      <text x="25" y="31" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="800" fill="#ffffff">Load unpacked</text>
      <rect x="184" y="0" width="130" height="48" rx="8" fill="#ffffff" stroke="#d0d5dd" />
      <text x="217" y="31" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="800" fill="#344054">Pack</text>
      <rect x="328" y="0" width="114" height="48" rx="8" fill="#ffffff" stroke="#d0d5dd" />
      <text x="357" y="31" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="800" fill="#344054">Update</text>
    </g>
    <rect x="28" y="174" width="414" height="86" rx="12" fill="#f9fafb" stroke="#eaecf0" />
    <text x="50" y="210" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#182230">No private browser data needed</text>
    <text x="50" y="238" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#667085">Use a clean profile when preparing public screenshots.</text>
  </g>

  <g transform="translate(630 250)">
    <rect x="0" y="0" width="430" height="300" rx="16" fill="#ffffff" stroke="#d0d5dd" />
    <text x="28" y="48" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="800" fill="#182230">Select extension folder</text>
    <rect x="28" y="78" width="374" height="170" rx="12" fill="#f9fafb" stroke="#eaecf0" />
    <g transform="translate(56 108)">
      <rect x="0" y="0" width="46" height="34" rx="6" fill="#fdb022" />
      <rect x="0" y="10" width="46" height="30" rx="6" fill="#f79009" />
      <text x="62" y="28" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#182230">lishu-0.0.3/</text>
      <text x="62" y="56" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#667085">unzipped release folder</text>
    </g>
    <g transform="translate(56 188)">
      <rect x="0" y="0" width="46" height="34" rx="6" fill="#84caff" />
      <rect x="0" y="10" width="46" height="30" rx="6" fill="#2e90fa" />
      <text x="62" y="28" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="#182230">dist/</text>
      <text x="62" y="56" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#667085">local build output</text>
    </g>
    <rect x="248" y="266" width="154" height="48" rx="8" fill="#0969da" />
    <text x="302" y="297" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="800" fill="#ffffff">Open</text>
  </g>

  <g transform="translate(96 598)">
    <rect x="0" y="0" width="1008" height="40" rx="20" fill="#ecfdf3" stroke="#abefc6" />
    <text x="24" y="26" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#067647">After loading: pin Lishu from the toolbar, configure your own LLM endpoint, and run a preview before writing any generated folder.</text>
  </g>
</svg>
