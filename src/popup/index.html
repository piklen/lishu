<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>理书 lishu</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main id="app">
      <h1>📚 理书 lishu</h1>
      <div id="toast" class="toast" hidden></div>

      <section class="card">
        <h2>大模型配置</h2>
        <label>协议
          <select id="protocol">
            <option value="openai-compatible">OpenAI 兼容</option>
            <option value="anthropic">Anthropic Messages API</option>
          </select>
        </label>
        <label>Endpoint
          <input id="endpoint" type="text" placeholder="https://api.openai.com/v1" />
        </label>
        <label>API Key
          <input id="apiKey" type="password" placeholder="sk-..." />
          <span id="apiKeyHint" class="field-hint">未填写 API Key</span>
        </label>
        <label>Model
          <input id="model" type="text" placeholder="gpt-4o-mini" />
        </label>
        <div id="modelHealth" class="model-health" hidden></div>
        <label>探查方式
          <select id="enrichMode">
            <option value="world-knowledge">模型自身知识(快 · 默认)</option>
            <option value="meta-scrape">抓网站首页(慢 · 更准)</option>
          </select>
        </label>
        <label>每批数量
          <input id="batchSize" type="number" min="1" max="100" step="1" value="40" />
        </label>
        <label>分类层级
          <select id="hierarchyMode">
            <option value="auto">自动: 超过阈值用二级目录</option>
            <option value="flat">始终一级目录</option>
            <option value="two-level">始终二级目录</option>
          </select>
        </label>
        <label>二级阈值
          <input id="hierarchyThreshold" type="number" min="5" max="50" step="1" value="30" />
        </label>
        <button id="save" class="btn-secondary">保存配置</button>
        <div id="configStatus" class="config-status" hidden></div>
        <button id="demoPreview" class="btn-secondary demo-button">体验示例预览</button>
      </section>

      <section class="card">
        <div id="modeBadge" class="mode-badge">真实模式</div>
        <div id="progressResume" class="progress-resume" hidden></div>
        <div id="preflight" class="preflight" hidden></div>
        <button id="start" class="btn-primary">开始整理</button>
        <button id="confirmWrite" class="btn-primary btn-confirm" disabled>确认写入副本</button>
        <div class="actions-row">
          <button id="reset" class="btn-secondary" disabled>清除进度</button>
          <button id="deleteOutput" class="btn-danger" disabled>删除上次结果</button>
        </div>
        <div id="status" class="status">待命</div>
        <div class="bar"><div id="barFill" class="bar-fill"></div></div>
        <div id="preview" class="preview" hidden></div>
        <button id="copyQualityReport" class="btn-secondary quality-copy" disabled hidden>复制质量报告</button>
        <p class="note">原书签不动,整理副本会出现在书签栏。默认只授权 LLM endpoint;抓首页时才申请网页访问。</p>
      </section>

      <section class="card">
        <h2>书签体检</h2>
        <div class="actions-row">
          <button id="analyzeBookmarks" class="btn-secondary">检查重复书签</button>
          <button id="checkDeadLinks" class="btn-secondary">检查失效链接</button>
          <button id="copyHealthReport" class="btn-secondary" disabled>复制报告</button>
        </div>
        <div id="healthStatus" class="status">未检查</div>
        <div id="healthReport" class="health-report" hidden></div>
        <p class="note">重复检测零网络。失效链接检测会先请求网页访问权限,只生成报告,不修改原书签。</p>
      </section>
    </main>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
