<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Lishu - AI Bookmark Organizer</title>
  <desc id="desc">A social sharing card for Lishu, a local-first Chrome bookmark organizer.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#182230" flood-opacity="0.18" />
    </filter>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f2f4f7" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#fbfcfe" />
  <rect x="48" y="48" width="1104" height="534" rx="28" fill="#ffffff" stroke="#d0d5dd" />
  <g transform="translate(96 92)">
    <text x="0" y="0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="800" fill="#067647">
      LOCAL-FIRST CHROME EXTENSION
    </text>
    <text x="0" y="82" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="82" font-weight="900" fill="#182230">
      <tspan x="0" dy="0">Lishu organizes</tspan>
      <tspan x="0" dy="92">bookmarks with</tspan>
      <tspan x="0" dy="92">your own LLM.</tspan>
    </text>
    <text x="0" y="392" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="500" fill="#475467">
      Preview first. Write only after confirmation.
    </text>
    <g transform="translate(0 428)">
      <rect x="0" y="0" width="202" height="54" rx="10" fill="#0969da" />
      <text x="24" y="35" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="800" fill="#ffffff">
        GitHub Release
      </text>
      <rect x="220" y="0" width="192" height="54" rx="10" fill="#ffffff" stroke="#d0d5dd" />
      <text x="244" y="35" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="800" fill="#182230">
        MIT · No backend
      </text>
    </g>
  </g>
  <g transform="translate(760 102)" filter="url(#shadow)">
    <rect x="0" y="0" width="300" height="426" rx="16" fill="url(#panel)" stroke="#d0d5dd" />
    <rect x="18" y="22" width="264" height="70" rx="10" fill="#ffffff" stroke="#d0d5dd" />
    <text x="36" y="50" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="800" fill="#344054">📚 理书 lishu</text>
    <text x="36" y="76" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#667085">OpenAI-compatible endpoint</text>
    <rect x="18" y="110" width="264" height="58" rx="10" fill="#0969da" />
    <text x="88" y="147" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="800" fill="#ffffff">Start organizing</text>
    <rect x="18" y="182" width="264" height="58" rx="10" fill="#8bb8f4" />
    <text x="83" y="219" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="800" fill="#ffffff">Confirm write copy</text>
    <rect x="18" y="262" width="126" height="54" rx="10" fill="#ffffff" stroke="#d0d5dd" />
    <rect x="156" y="262" width="126" height="54" rx="10" fill="#ffffff" stroke="#d0d5dd" />
    <text x="46" y="295" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="800" fill="#344054">Duplicates</text>
    <text x="182" y="295" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="800" fill="#344054">Dead links</text>
    <rect x="18" y="342" width="264" height="46" rx="10" fill="#f2f4f7" />
    <text x="38" y="371" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#667085">Original bookmarks stay untouched.</text>
  </g>
</svg>
