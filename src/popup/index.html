<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>理书 lishu</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main id="app">
      <h1>📚 理书 lishu</h1>

      <section class="card">
        <h2>大模型配置</h2>
        <label>协议
          <select id="protocol">
            <option value="openai-compatible">OpenAI 兼容</option>
            <option value="anthropic">Anthropic Messages API</option>
          </select>
        </label>
        <label>Endpoint
          <input id="endpoint" type="text" placeholder="https://api.openai.com/v1" />
        </label>
        <label>API Key
          <input id="apiKey" type="password" placeholder="sk-..." />
        </label>
        <label>Model
          <input id="model" type="text" placeholder="gpt-4o-mini" />
        </label>
        <label>探查方式
          <select id="enrichMode">
            <option value="world-knowledge">模型自身知识(快 · 默认)</option>
            <option value="meta-scrape">抓网站首页(慢 · 更准)</option>
          </select>
        </label>
        <label>每批数量
          <input id="batchSize" type="number" min="1" max="100" step="1" />
        </label>
        <button id="save" class="btn-secondary">保存配置</button>
      </section>

      <section class="card">
        <button id="start" class="btn-primary">开始整理</button>
        <div id="status" class="status">待命</div>
        <div class="bar"><div id="barFill" class="bar-fill"></div></div>
        <p class="note">整理结果会放进新建的「📚 理书整理 日期」文件夹,原书签不动。</p>
      </section>
    </main>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
